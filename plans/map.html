<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Language Lesson Generator | Map + Phylogenetic Tree</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            overflow: hidden;
            background: #0a1620;
        }

        .ui-panel {
            position: absolute;
            z-index: 200;
            background: rgba(10, 20, 30, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 8px 16px;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 180px;
        }

        #selection-panel {
            top: 20px;
            left: 20px;
        }

        .selection-row {
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: center;
        }

        .badge-icon {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
        }

        .badge-icon span:first-child {
            font-size: 14px;
        }

        .badge-icon span:last-child {
            color: #ffaa66;
            font-weight: bold;
            max-width: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .controls-row {
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 6px;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.3);
            padding: 4px 10px;
            border-radius: 30px;
        }

        .toggle-icon {
            font-size: 16px;
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        .toggle-icon.active {
            opacity: 1;
            text-shadow: 0 0 4px #ffaa44;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #3a5a6e;
            transition: 0.3s;
            border-radius: 20px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #ffaa44;
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        .reset-btn-icon {
            background: rgba(58, 90, 110, 0.8);
            border: none;
            padding: 5px 12px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
            color: white;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .reset-btn-icon:hover {
            background: #4a6a7e;
            transform: scale(1.02);
        }

        #instruction {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            color: #aaa;
            pointer-events: none;
            font-family: monospace;
            z-index: 200;
            backdrop-filter: blur(4px);
        }

        .canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        #map-canvas {
            z-index: 10;
            opacity: 1;
            transition: opacity 0.4s ease;
        }

        #tree-canvas {
            z-index: 5;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .map-dot, .tree-dot {
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            cursor: pointer;
            transform: translate(-50%, -50%);
            transition: all 0.2s ease;
            box-shadow: 0 0 0 2px white, 0 0 0 4px rgba(0,0,0,0.3);
            z-index: 20;
        }

        .map-dot:hover, .tree-dot:hover {
            transform: translate(-50%, -50%) scale(1.3);
            box-shadow: 0 0 0 3px white, 0 0 0 6px rgba(0,0,0,0.4);
        }

        .map-dot.selected, .tree-dot.selected {
            box-shadow: 0 0 0 3px #ffaa44, 0 0 0 8px rgba(255, 170, 68, 0.4);
            transform: translate(-50%, -50%) scale(1.25);
        }

        .map-label {
            position: absolute;
            background: rgba(0, 0, 0, 0.75);
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 12px;
            white-space: nowrap;
            pointer-events: none;
            font-weight: 500;
            transform: translate(12px, -4px);
            z-index: 21;
            font-family: monospace;
        }

        @media (max-width: 700px) {
            .ui-panel { padding: 6px 12px; }
            .badge-icon { padding: 4px 8px; font-size: 11px; }
            .map-dot, .tree-dot { width: 14px; height: 14px; }
        }
    </style>
</head>
<body>
    <div id="selection-panel" class="ui-panel">
        <div class="selection-row">
            <div class="badge-icon" id="source-badge">
                <span>📖</span>
                <span id="source-name">—</span>
            </div>
            <div class="badge-icon" id="target-badge">
                <span>🎯</span>
                <span id="target-name">—</span>
            </div>
        </div>
        
        <div class="controls-row">
            <div class="toggle-container">
                <span class="toggle-icon" id="map-icon">🗺️</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="view-toggle">
                    <span class="slider"></span>
                </label>
                <span class="toggle-icon" id="tree-icon">🌳</span>
            </div>
            <button id="reset-btn" class="reset-btn-icon">
                <span>↺</span> Reset
            </button>
        </div>
    </div>

    <div id="instruction">🖱️ Click dots to select | 🔄 Toggle Map/Tree</div>

    <div id="map-canvas" class="canvas-container"></div>
    <div id="tree-canvas" class="canvas-container"></div>

    <script>
        // ============================================
        // EXACT TREE COORDINATES FROM map_v3.html
        // (No layout calculation - hardcoded positions)
        // ============================================
        
        // All tree nodes with their exact positions and colors (matched to world map)
        const treeNodes = [
            // Leaf nodes (languages) - Indo-European (golden)
            { name: "English", x: 40, y: 200, color: "#e5b73b" },
            { name: "German", x: 70, y: 200, color: "#e5b73b" },
            { name: "Dutch", x: 100, y: 200, color: "#e5b73b" },
            { name: "Luxembourgish", x: 130, y: 200, color: "#e5b73b" },
            { name: "Swedish", x: 160, y: 200, color: "#e5b73b" },
            { name: "Danish", x: 190, y: 200, color: "#e5b73b" },
            { name: "French", x: 230, y: 200, color: "#e5b73b" },
            { name: "Spanish", x: 255, y: 200, color: "#e5b73b" },
            { name: "Portuguese", x: 280, y: 200, color: "#e5b73b" },
            { name: "Catalan", x: 305, y: 200, color: "#e5b73b" },
            { name: "Italian", x: 330, y: 200, color: "#e5b73b" },
            { name: "Romanian", x: 355, y: 200, color: "#e5b73b" },
            { name: "Greek", x: 380, y: 130, color: "#e5b73b" },
            { name: "Polish", x: 400, y: 200, color: "#e5b73b" },
            { name: "Russian", x: 430, y: 200, color: "#e5b73b" },
            { name: "Ukrainian", x: 460, y: 200, color: "#e5b73b" },
            { name: "Czech", x: 490, y: 200, color: "#e5b73b" },
            { name: "Hindi", x: 540, y: 130, color: "#e5b73b" },
            // Uralic (green)
            { name: "Finnish", x: 480, y: 130, color: "#55aa88" },
            { name: "Hungarian", x: 520, y: 130, color: "#55aa88" },
            // Semitic (teal)
            { name: "Arabic", x: 590, y: 130, color: "#2c7f6e" },
            { name: "Hebrew", x: 650, y: 130, color: "#2c7f6e" },
            // Turkic (orange)
            { name: "Turkish", x: 720, y: 130, color: "#e8953b" },
            // East Asia (red/multi)
            { name: "MandarinChinese", x: 290, y: 190, color: "#b31b3b", displayName: "Mandarin" },
            { name: "Japanese", x: 320, y: 190, color: "#dd6699" },
            { name: "Korean", x: 350, y: 190, color: "#cc55aa" },
            { name: "Thai", x: 380, y: 190, color: "#66aacc" },
            { name: "Indonesian", x: 410, y: 190, color: "#e2856e" },
            // Africa (green)
            { name: "Swahili", x: 600, y: 190, color: "#3c9b4c" },
            
            // Ancestor nodes
            { name: "Germanic", x: 100, y: 160, color: "#c99b2a", isAncestor: true },
            { name: "Romance", x: 280, y: 160, color: "#c99b2a", isAncestor: true },
            { name: "Slavic", x: 440, y: 160, color: "#c99b2a", isAncestor: true },
            { name: "IndoEuropean", x: 220, y: 90, color: "#e5b73b", isAncestor: true },
            { name: "Uralic", x: 500, y: 90, color: "#55aa88", isAncestor: true },
            { name: "Semitic", x: 620, y: 90, color: "#2c7f6e", isAncestor: true },
            { name: "Turkic", x: 720, y: 90, color: "#e8953b", isAncestor: true },
            { name: "EastAsia", x: 320, y: 150, color: "#b31b3b", isAncestor: true },
            { name: "Africa", x: 600, y: 150, color: "#3c9b4c", isAncestor: true },
            { name: "Proto-Human", x: 400, y: 30, color: "#ffaa66", isAncestor: true }
        ];
        
        // Edge connections (parent-child)
        const edges = [
            { from: "Proto-Human", to: "IndoEuropean" },
            { from: "Proto-Human", to: "Uralic" },
            { from: "Proto-Human", to: "Semitic" },
            { from: "Proto-Human", to: "Turkic" },
            { from: "Proto-Human", to: "EastAsia" },
            { from: "Proto-Human", to: "Africa" },
            { from: "IndoEuropean", to: "Germanic" },
            { from: "IndoEuropean", to: "Romance" },
            { from: "IndoEuropean", to: "Slavic" },
            { from: "IndoEuropean", to: "Greek" },
            { from: "IndoEuropean", to: "Hindi" },
            { from: "Germanic", to: "English" },
            { from: "Germanic", to: "German" },
            { from: "Germanic", to: "Dutch" },
            { from: "Germanic", to: "Luxembourgish" },
            { from: "Germanic", to: "Swedish" },
            { from: "Germanic", to: "Danish" },
            { from: "Romance", to: "French" },
            { from: "Romance", to: "Spanish" },
            { from: "Romance", to: "Portuguese" },
            { from: "Romance", to: "Catalan" },
            { from: "Romance", to: "Italian" },
            { from: "Romance", to: "Romanian" },
            { from: "Slavic", to: "Polish" },
            { from: "Slavic", to: "Russian" },
            { from: "Slavic", to: "Ukrainian" },
            { from: "Slavic", to: "Czech" },
            { from: "Uralic", to: "Finnish" },
            { from: "Uralic", to: "Hungarian" },
            { from: "Semitic", to: "Arabic" },
            { from: "Semitic", to: "Hebrew" },
            { from: "Turkic", to: "Turkish" },
            { from: "EastAsia", to: "MandarinChinese" },
            { from: "EastAsia", to: "Japanese" },
            { from: "EastAsia", to: "Korean" },
            { from: "EastAsia", to: "Thai" },
            { from: "EastAsia", to: "Indonesian" },
            { from: "Africa", to: "Swahili" }
        ];
        
        // Map dots data (unchanged coordinates from map_v3.html)
        const mapDotsData = [
            { name: "English", mapX: 0.14, mapY: 0.48, color: "#e5b73b" },
            { name: "German", mapX: 0.25, mapY: 0.48, color: "#e5b73b" },
            { name: "Dutch", mapX: 0.22, mapY: 0.49, color: "#e5b73b" },
            { name: "Luxembourgish", mapX: 0.24, mapY: 0.50, color: "#e5b73b" },
            { name: "Swedish", mapX: 0.38, mapY: 0.42, color: "#e5b73b" },
            { name: "Danish", mapX: 0.35, mapY: 0.44, color: "#e5b73b" },
            { name: "French", mapX: 0.28, mapY: 0.52, color: "#e5b73b" },
            { name: "Spanish", mapX: 0.15, mapY: 0.58, color: "#e5b73b" },
            { name: "Portuguese", mapX: 0.09, mapY: 0.57, color: "#e5b73b" },
            { name: "Catalan", mapX: 0.27, mapY: 0.56, color: "#e5b73b" },
            { name: "Italian", mapX: 0.36, mapY: 0.54, color: "#e5b73b" },
            { name: "Romanian", mapX: 0.46, mapY: 0.54, color: "#e5b73b" },
            { name: "Greek", mapX: 0.44, mapY: 0.60, color: "#e5b73b" },
            { name: "Polish", mapX: 0.42, mapY: 0.49, color: "#e5b73b" },
            { name: "Russian", mapX: 0.58, mapY: 0.45, color: "#e5b73b" },
            { name: "Ukrainian", mapX: 0.52, mapY: 0.48, color: "#e5b73b" },
            { name: "Czech", mapX: 0.39, mapY: 0.50, color: "#e5b73b" },
            { name: "Hindi", mapX: 0.68, mapY: 0.65, color: "#e5b73b" },
            { name: "Finnish", mapX: 0.43, mapY: 0.40, color: "#55aa88" },
            { name: "Hungarian", mapX: 0.40, mapY: 0.51, color: "#55aa88" },
            { name: "Arabic", mapX: 0.48, mapY: 0.68, color: "#2c7f6e" },
            { name: "Hebrew", mapX: 0.44, mapY: 0.65, color: "#2c7f6e" },
            { name: "Turkish", mapX: 0.50, mapY: 0.59, color: "#e8953b" },
            { name: "MandarinChinese", displayName: "Mandarin", mapX: 0.80, mapY: 0.55, color: "#b31b3b" },
            { name: "Japanese", mapX: 0.88, mapY: 0.53, color: "#dd6699" },
            { name: "Korean", mapX: 0.86, mapY: 0.57, color: "#cc55aa" },
            { name: "Thai", mapX: 0.78, mapY: 0.68, color: "#66aacc" },
            { name: "Indonesian", mapX: 0.82, mapY: 0.76, color: "#e2856e" },
            { name: "Swahili", mapX: 0.56, mapY: 0.74, color: "#3c9b4c" }
        ];
        
        // Build parent-child relationships for pathfinding
        const parentMap = new Map();
        edges.forEach(edge => {
            parentMap.set(edge.to, edge.from);
        });
        
        function findPathToRoot(nodeName) {
            const path = [nodeName];
            let current = nodeName;
            while (parentMap.has(current)) {
                current = parentMap.get(current);
                path.push(current);
            }
            return path;
        }
        
        function findEvolutionaryPath(sourceName, targetName) {
            const sourcePath = findPathToRoot(sourceName);
            const targetPath = findPathToRoot(targetName);
            
            let lca = null;
            for (const s of sourcePath) {
                if (targetPath.includes(s)) {
                    lca = s;
                    break;
                }
            }
            
            if (!lca) return [sourceName, targetName];
            
            const sourceToLca = sourcePath.slice(0, sourcePath.indexOf(lca) + 1);
            const targetToLca = targetPath.slice(0, targetPath.indexOf(lca)).reverse();
            return [...sourceToLca, ...targetToLca];
        }
        
        let sourceLang = null;
        let targetLang = null;
        let mapWidth, mapHeight;
        let currentView = 'map';
        
        const mapContainer = document.getElementById('map-canvas');
        const treeContainer = document.getElementById('tree-canvas');
        let mapCtx, treeCtx;
        
        function initCanvases() {
            const resize = () => {
                mapWidth = window.innerWidth;
                mapHeight = window.innerHeight;
                
                mapContainer.innerHTML = '';
                treeContainer.innerHTML = '';
                
                const mapCanvas = document.createElement('canvas');
                mapCanvas.width = mapWidth;
                mapCanvas.height = mapHeight;
                mapContainer.appendChild(mapCanvas);
                mapCtx = mapCanvas.getContext('2d');
                
                const treeCanvas = document.createElement('canvas');
                treeCanvas.width = mapWidth;
                treeCanvas.height = mapHeight;
                treeContainer.appendChild(treeCanvas);
                treeCtx = treeCanvas.getContext('2d');
                
                drawMap();
                drawFullTree();
                createClickableElements();
            };
            
            window.addEventListener('resize', resize);
            resize();
        }
        
        function drawMap() {
            if (!mapCtx) return;
            
            mapCtx.fillStyle = '#1a3a5a';
            mapCtx.fillRect(0, 0, mapWidth, mapHeight);
            
            // Continents
            mapCtx.fillStyle = '#2a4a5a';
            mapCtx.beginPath();
            mapCtx.moveTo(mapWidth * 0.28, mapHeight * 0.32);
            mapCtx.lineTo(mapWidth * 0.52, mapHeight * 0.30);
            mapCtx.lineTo(mapWidth * 0.48, mapHeight * 0.55);
            mapCtx.lineTo(mapWidth * 0.30, mapHeight * 0.58);
            mapCtx.fill();
            
            mapCtx.fillStyle = '#3a5a6a';
            mapCtx.beginPath();
            mapCtx.moveTo(mapWidth * 0.50, mapHeight * 0.28);
            mapCtx.lineTo(mapWidth * 0.92, mapHeight * 0.26);
            mapCtx.lineTo(mapWidth * 0.95, mapHeight * 0.62);
            mapCtx.lineTo(mapWidth * 0.65, mapHeight * 0.68);
            mapCtx.lineTo(mapWidth * 0.48, mapHeight * 0.55);
            mapCtx.fill();
            
            mapCtx.fillStyle = '#2a5a4a';
            mapCtx.beginPath();
            mapCtx.moveTo(mapWidth * 0.42, mapHeight * 0.58);
            mapCtx.lineTo(mapWidth * 0.58, mapHeight * 0.56);
            mapCtx.lineTo(mapWidth * 0.55, mapHeight * 0.82);
            mapCtx.lineTo(mapWidth * 0.40, mapHeight * 0.80);
            mapCtx.fill();
            
            mapDotsData.forEach(dot => {
                const x = dot.mapX * mapWidth;
                const y = dot.mapY * mapHeight;
                const radius = 10;
                const displayName = dot.displayName || dot.name;
                
                mapCtx.beginPath();
                mapCtx.arc(x, y, radius, 0, Math.PI * 2);
                mapCtx.fillStyle = dot.color;
                mapCtx.fill();
                mapCtx.beginPath();
                mapCtx.arc(x, y, radius * 0.4, 0, Math.PI * 2);
                mapCtx.fillStyle = 'white';
                mapCtx.fill();
                
                mapCtx.fillStyle = 'rgba(0,0,0,0.7)';
                mapCtx.font = `bold ${Math.floor(mapWidth * 0.01)}px Arial`;
                const metrics = mapCtx.measureText(displayName);
                mapCtx.fillRect(x + 12, y - 10, metrics.width + 8, 16);
                
                mapCtx.fillStyle = dot.color;
                mapCtx.fillText(displayName, x + 16, y - 2);
            });
            
            mapCtx.fillStyle = 'rgba(255,255,255,0.35)';
            mapCtx.font = `italic ${Math.floor(mapWidth * 0.02)}px Arial`;
            mapCtx.fillText("EUROPE", mapWidth * 0.32, mapHeight * 0.28);
            mapCtx.fillText("ASIA", mapWidth * 0.68, mapHeight * 0.25);
            mapCtx.fillText("AFRICA", mapWidth * 0.45, mapHeight * 0.55);
        }
        
        function drawFullTree() {
            if (!treeCtx) return;
            
            const scaleX = mapWidth / 800;
            const scaleY = mapHeight / 600;
            
            treeCtx.clearRect(0, 0, mapWidth, mapHeight);
            treeCtx.fillStyle = '#0a1620';
            treeCtx.fillRect(0, 0, mapWidth, mapHeight);
            
            // Draw edges
            edges.forEach(edge => {
                const fromNode = treeNodes.find(n => n.name === edge.from);
                const toNode = treeNodes.find(n => n.name === edge.to);
                if (fromNode && toNode) {
                    const fromX = fromNode.x * scaleX;
                    const fromY = fromNode.y * scaleY;
                    const toX = toNode.x * scaleX;
                    const toY = toNode.y * scaleY;
                    
                    treeCtx.beginPath();
                    treeCtx.moveTo(fromX, fromY);
                    treeCtx.lineTo(toX, toY);
                    treeCtx.strokeStyle = '#ffffff40';
                    treeCtx.lineWidth = 2;
                    treeCtx.stroke();
                }
            });
            
            // Draw nodes
            treeNodes.forEach(node => {
                const x = node.x * scaleX;
                const y = node.y * scaleY;
                const radius = node.isAncestor ? 6 : 8;
                const color = node.color;
                
                treeCtx.beginPath();
                treeCtx.arc(x, y, radius, 0, Math.PI * 2);
                treeCtx.fillStyle = color;
                treeCtx.fill();
                treeCtx.beginPath();
                treeCtx.arc(x, y, radius * 0.4, 0, Math.PI * 2);
                treeCtx.fillStyle = 'white';
                treeCtx.fill();
                
                // Labels
                if (!node.isAncestor && node.name !== 'MandarinChinese') {
                    treeCtx.fillStyle = '#cccccc';
                    treeCtx.font = `${Math.floor(mapWidth * 0.009)}px Arial`;
                    treeCtx.fillText(node.name, x - 20, y + 15);
                } else if (node.name === 'MandarinChinese') {
                    treeCtx.fillStyle = '#cccccc';
                    treeCtx.font = `${Math.floor(mapWidth * 0.009)}px Arial`;
                    treeCtx.fillText("Mandarin", x - 20, y + 15);
                } else if (node.isAncestor && node.name !== 'Proto-Human') {
                    treeCtx.fillStyle = '#888888';
                    treeCtx.font = `italic ${Math.floor(mapWidth * 0.008)}px Arial`;
                    treeCtx.fillText(node.name, x + 8, y - 3);
                } else if (node.name === 'Proto-Human') {
                    treeCtx.fillStyle = '#ffaa66';
                    treeCtx.font = `bold ${Math.floor(mapWidth * 0.012)}px Arial`;
                    treeCtx.fillText(node.name, x - 35, y - 10);
                }
            });
        }
        
        function highlightTreePath(pathNodes) {
            if (!treeCtx) return;
            
            const pathSet = new Set(pathNodes);
            const scaleX = mapWidth / 800;
            const scaleY = mapHeight / 600;
            
            treeCtx.clearRect(0, 0, mapWidth, mapHeight);
            treeCtx.fillStyle = '#0a1620';
            treeCtx.fillRect(0, 0, mapWidth, mapHeight);
            
            // Draw all edges
            edges.forEach(edge => {
                const fromNode = treeNodes.find(n => n.name === edge.from);
                const toNode = treeNodes.find(n => n.name === edge.to);
                if (fromNode && toNode) {
                    const fromX = fromNode.x * scaleX;
                    const fromY = fromNode.y * scaleY;
                    const toX = toNode.x * scaleX;
                    const toY = toNode.y * scaleY;
                    const isPathEdge = pathSet.has(edge.from) && pathSet.has(edge.to);
                    
                    treeCtx.beginPath();
                    treeCtx.moveTo(fromX, fromY);
                    treeCtx.lineTo(toX, toY);
                    
                    if (isPathEdge) {
                        treeCtx.strokeStyle = '#ff3333';
                        treeCtx.lineWidth = 4;
                    } else {
                        treeCtx.strokeStyle = '#ffffff15';
                        treeCtx.lineWidth = 2;
                    }
                    treeCtx.stroke();
                }
            });
            
            // Draw nodes
            treeNodes.forEach(node => {
                const x = node.x * scaleX;
                const y = node.y * scaleY;
                const isPathNode = pathSet.has(node.name);
                const isSource = sourceLang?.name === node.name;
                const isTarget = targetLang?.name === node.name;
                const baseRadius = node.isAncestor ? 6 : 8;
                const color = node.color;
                
                if (isPathNode || isSource || isTarget) {
                    treeCtx.beginPath();
                    treeCtx.arc(x, y, baseRadius + 4, 0, Math.PI * 2);
                    if (isSource || isTarget) {
                        treeCtx.fillStyle = '#ff3300';
                    } else {
                        treeCtx.fillStyle = '#ffaa44';
                    }
                    treeCtx.fill();
                    treeCtx.beginPath();
                    treeCtx.arc(x, y, baseRadius, 0, Math.PI * 2);
                    treeCtx.fillStyle = color;
                    treeCtx.fill();
                    treeCtx.beginPath();
                    treeCtx.arc(x, y, baseRadius * 0.4, 0, Math.PI * 2);
                    treeCtx.fillStyle = 'white';
                    treeCtx.fill();
                    
                    treeCtx.fillStyle = 'white';
                    treeCtx.font = `bold ${Math.floor(mapWidth * 0.009)}px Arial`;
                    if (!node.isAncestor) {
                        const displayName = node.name === 'MandarinChinese' ? 'Mandarin' : node.name;
                        treeCtx.fillText(displayName, x - 20, y + 15);
                    } else if (node.name !== 'Proto-Human') {
                        treeCtx.fillText(node.name, x + 10, y - 4);
                    } else {
                        treeCtx.fillText(node.name, x - 35, y - 10);
                    }
                } else {
                    treeCtx.beginPath();
                    treeCtx.arc(x, y, baseRadius, 0, Math.PI * 2);
                    treeCtx.fillStyle = color + '40';
                    treeCtx.fill();
                    treeCtx.beginPath();
                    treeCtx.arc(x, y, baseRadius * 0.4, 0, Math.PI * 2);
                    treeCtx.fillStyle = color + '80';
                    treeCtx.fill();
                    
                    if (!node.isAncestor && node.name !== 'MandarinChinese') {
                        treeCtx.fillStyle = '#555555';
                        treeCtx.font = `${Math.floor(mapWidth * 0.009)}px Arial`;
                        treeCtx.fillText(node.name, x - 20, y + 15);
                    } else if (node.name === 'MandarinChinese') {
                        treeCtx.fillStyle = '#555555';
                        treeCtx.font = `${Math.floor(mapWidth * 0.009)}px Arial`;
                        treeCtx.fillText("Mandarin", x - 20, y + 15);
                    } else if (node.isAncestor && node.name !== 'Proto-Human') {
                        treeCtx.fillStyle = '#444444';
                        treeCtx.font = `italic ${Math.floor(mapWidth * 0.008)}px Arial`;
                        treeCtx.fillText(node.name, x + 8, y - 3);
                    } else if (node.name === 'Proto-Human') {
                        treeCtx.fillStyle = '#666666';
                        treeCtx.font = `bold ${Math.floor(mapWidth * 0.012)}px Arial`;
                        treeCtx.fillText(node.name, x - 35, y - 10);
                    }
                }
            });
        }
        
        function createClickableElements() {
            const mapOverlay = document.createElement('div');
            mapOverlay.style.position = 'absolute';
            mapOverlay.style.top = '0';
            mapOverlay.style.left = '0';
            mapOverlay.style.width = '100%';
            mapOverlay.style.height = '100%';
            mapOverlay.style.zIndex = '15';
            mapOverlay.style.pointerEvents = 'auto';
            mapOverlay.id = 'map-click-overlay';
            
            const treeOverlay = document.createElement('div');
            treeOverlay.style.position = 'absolute';
            treeOverlay.style.top = '0';
            treeOverlay.style.left = '0';
            treeOverlay.style.width = '100%';
            treeOverlay.style.height = '100%';
            treeOverlay.style.zIndex = '15';
            treeOverlay.style.pointerEvents = 'auto';
            treeOverlay.id = 'tree-click-overlay';
            treeOverlay.style.display = 'none';
            
            const scaleX = mapWidth / 800;
            const scaleY = mapHeight / 600;
            
            // Map dots
            mapDotsData.forEach(dot => {
                const x = dot.mapX * mapWidth;
                const y = dot.mapY * mapHeight;
                
                const el = document.createElement('div');
                el.className = 'map-dot';
                el.style.backgroundColor = dot.color;
                el.style.left = x + 'px';
                el.style.top = y + 'px';
                el.title = dot.displayName || dot.name;
                const treeNode = treeNodes.find(n => n.name === dot.name);
                el.onclick = (e) => {
                    e.stopPropagation();
                    if (treeNode) handleLanguageClick(treeNode);
                };
                mapOverlay.appendChild(el);
            });
            
            // Tree dots
            treeNodes.filter(n => !n.isAncestor).forEach(node => {
                const x = node.x * scaleX;
                const y = node.y * scaleY;
                const displayName = node.name === 'MandarinChinese' ? 'Mandarin' : node.name;
                
                const el = document.createElement('div');
                el.className = 'tree-dot';
                el.style.backgroundColor = node.color;
                el.style.left = x + 'px';
                el.style.top = y + 'px';
                el.title = displayName;
                el.onclick = (e) => {
                    e.stopPropagation();
                    handleLanguageClick(node);
                };
                treeOverlay.appendChild(el);
            });
            
            const existingMapOverlay = document.querySelector('#map-click-overlay');
            if (existingMapOverlay) existingMapOverlay.remove();
            const existingTreeOverlay = document.querySelector('#tree-click-overlay');
            if (existingTreeOverlay) existingTreeOverlay.remove();
            
            document.body.appendChild(mapOverlay);
            document.body.appendChild(treeOverlay);
        }
        
        function updateView() {
            const mapOverlay = document.querySelector('#map-click-overlay');
            const treeOverlay = document.querySelector('#tree-click-overlay');
            const mapIcon = document.getElementById('map-icon');
            const treeIcon = document.getElementById('tree-icon');
            
            if (currentView === 'map') {
                document.getElementById('map-canvas').style.opacity = '1';
                document.getElementById('tree-canvas').style.opacity = '0';
                if (mapOverlay) mapOverlay.style.display = 'block';
                if (treeOverlay) treeOverlay.style.display = 'none';
                mapIcon.classList.add('active');
                treeIcon.classList.remove('active');
            } else {
                document.getElementById('map-canvas').style.opacity = '0';
                document.getElementById('tree-canvas').style.opacity = '1';
                if (mapOverlay) mapOverlay.style.display = 'none';
                if (treeOverlay) treeOverlay.style.display = 'block';
                mapIcon.classList.remove('active');
                treeIcon.classList.add('active');
            }
        }
        
        function updateDotSelection() {
            const mapDots = document.querySelectorAll('.map-dot');
            const treeDots = document.querySelectorAll('.tree-dot');
            
            mapDots.forEach(dot => dot.classList.remove('selected'));
            treeDots.forEach(dot => dot.classList.remove('selected'));
            
            if (sourceLang) {
                const sourceDisplay = sourceLang.name === 'MandarinChinese' ? 'Mandarin' : sourceLang.name;
                const sourceMapDot = Array.from(mapDots).find(d => d.title === sourceDisplay);
                const sourceTreeDot = Array.from(treeDots).find(d => d.title === sourceDisplay);
                if (sourceMapDot) sourceMapDot.classList.add('selected');
                if (sourceTreeDot) sourceTreeDot.classList.add('selected');
                document.getElementById('source-name').innerText = sourceDisplay;
                document.getElementById('source-badge').classList.remove('empty');
            } else {
                document.getElementById('source-name').innerText = '—';
                document.getElementById('source-badge').classList.add('empty');
            }
            
            if (targetLang) {
                const targetDisplay = targetLang.name === 'MandarinChinese' ? 'Mandarin' : targetLang.name;
                const targetMapDot = Array.from(mapDots).find(d => d.title === targetDisplay);
                if (targetMapDot) targetMapDot.classList.add('selected');
                document.getElementById('target-name').innerText = targetDisplay;
                document.getElementById('target-badge').classList.remove('empty');
            } else {
                document.getElementById('target-name').innerText = '—';
                document.getElementById('target-badge').classList.add('empty');
            }
        }
        
        function updatePathHighlight() {
            if (sourceLang && targetLang) {
                const pathNodes = findEvolutionaryPath(sourceLang.name, targetLang.name);
                highlightTreePath(pathNodes);
            } else if (!sourceLang || !targetLang) {
                drawFullTree();
                updateDotSelection();
            }
        }
        
        function handleLanguageClick(lang) {
            if (!sourceLang) {
                sourceLang = lang;
                updateDotSelection();
                if (targetLang) updatePathHighlight();
            } else if (sourceLang && !targetLang && sourceLang !== lang) {
                targetLang = lang;
                updateDotSelection();
                updatePathHighlight();
                if (currentView === 'map') {
                    toggleCheckbox.checked = true;
                    currentView = 'tree';
                    updateView();
                }
            } else if (sourceLang && targetLang) {
                resetSelection();
                sourceLang = lang;
                updateDotSelection();
            } else if (sourceLang === lang) {
                resetSelection();
            }
        }
        
        function resetSelection() {
            sourceLang = null;
            targetLang = null;
            updateDotSelection();
            drawFullTree();
        }
        
        const toggleCheckbox = document.getElementById('view-toggle');
        toggleCheckbox.addEventListener('change', (e) => {
            currentView = e.target.checked ? 'tree' : 'map';
            updateView();
        });
        
        initCanvases();
        
        document.getElementById('reset-btn').addEventListener('click', resetSelection);
    </script>
</body>
</html>
