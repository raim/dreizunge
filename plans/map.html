<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Language Lesson Generator | Complete World Map + Tree</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            overflow: hidden;
            background: #0a1620;
        }

        .ui-panel {
            position: absolute;
            z-index: 200;
            background: rgba(10, 20, 30, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 8px 16px;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 180px;
        }

        #selection-panel {
            top: 20px;
            left: 20px;
        }

        .selection-row {
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: center;
        }

        .badge-icon {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
        }

        .badge-icon span:first-child {
            font-size: 14px;
        }

        .badge-icon span:last-child {
            color: #ffaa66;
            font-weight: bold;
            max-width: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .controls-row {
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 6px;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.3);
            padding: 4px 10px;
            border-radius: 30px;
        }

        .toggle-icon {
            font-size: 16px;
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        .toggle-icon.active {
            opacity: 1;
            text-shadow: 0 0 4px #ffaa44;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #3a5a6e;
            transition: 0.3s;
            border-radius: 20px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #ffaa44;
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        .reset-btn-icon {
            background: rgba(58, 90, 110, 0.8);
            border: none;
            padding: 5px 12px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
            color: white;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .reset-btn-icon:hover {
            background: #4a6a7e;
            transform: scale(1.02);
        }

        #lesson-panel {
            bottom: 20px;
            right: 20px;
            max-width: 360px;
            transform: translateY(120%);
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border-left: 4px solid #ff3333;
            border-radius: 16px;
            flex-direction: column;
            align-items: stretch;
            gap: 8px;
            padding: 16px;
        }

        #lesson-panel.visible {
            transform: translateY(0);
        }

        .lesson-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .lesson-header h4 {
            font-size: 14px;
            color: #ffaa66;
        }

        #close-lesson {
            background: none;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            padding: 0 4px;
            opacity: 0.7;
        }

        #close-lesson:hover {
            opacity: 1;
        }

        .lesson-content {
            font-size: 13px;
            line-height: 1.4;
        }

        #instruction {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            color: #aaa;
            pointer-events: none;
            font-family: monospace;
            z-index: 200;
            backdrop-filter: blur(4px);
        }

        .canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        #map-canvas {
            z-index: 10;
            opacity: 1;
            transition: opacity 0.4s ease;
        }

        #tree-canvas {
            z-index: 5;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .flying-dot {
            position: absolute;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            z-index: 100;
            pointer-events: none;
            box-shadow: 0 0 0 2px white, 0 0 0 4px rgba(0,0,0,0.3);
            transition: left 1s cubic-bezier(0.33, 1, 0.68, 1), top 1s cubic-bezier(0.33, 1, 0.68, 1);
        }

        .flying-dot::after {
            content: attr(data-name);
            position: absolute;
            left: 28px;
            top: 4px;
            background: rgba(0,0,0,0.85);
            color: white;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 12px;
            white-space: nowrap;
            font-weight: bold;
            pointer-events: none;
        }

        .map-dot, .tree-dot {
            position: absolute;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            transform: translate(-50%, -50%);
            transition: all 0.2s ease;
            box-shadow: 0 0 0 2px white, 0 0 0 4px rgba(0,0,0,0.3);
            z-index: 20;
        }

        .map-dot:hover, .tree-dot:hover {
            transform: translate(-50%, -50%) scale(1.3);
            box-shadow: 0 0 0 3px white, 0 0 0 6px rgba(0,0,0,0.4);
        }

        .map-dot.selected, .tree-dot.selected {
            box-shadow: 0 0 0 3px #ffaa44, 0 0 0 8px rgba(255, 170, 68, 0.4);
            transform: translate(-50%, -50%) scale(1.25);
        }

        .map-label {
            position: absolute;
            background: rgba(0, 0, 0, 0.75);
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 12px;
            white-space: nowrap;
            pointer-events: none;
            font-weight: 500;
            transform: translate(12px, -4px);
            z-index: 21;
            font-family: monospace;
        }

        @media (max-width: 700px) {
            .ui-panel { padding: 6px 12px; }
            .badge-icon { padding: 4px 8px; font-size: 11px; }
            .map-dot, .tree-dot { width: 16px; height: 16px; }
            .map-label { font-size: 8px; transform: translate(10px, -3px); }
        }
    </style>
</head>

        // Build parent map for pathfinding
        const parentMap = new Map();
        uniqueLanguages.forEach(lang => { if (lang.parent) parentMap.set(lang.id, lang.parent); });

        function findEvolutionaryPath(sourceId, targetId) {
            function getAncestors(id) {
                const chain = [id];
                let current = id;
                while (parentMap.has(current)) {
                    current = parentMap.get(current);
                    chain.push(current);
                }
                return chain;
            }
            
            const sourceAncestors = getAncestors(sourceId);
            const targetAncestors = getAncestors(targetId);
            
            let lca = null;
            for (let s of sourceAncestors) {
                if (targetAncestors.includes(s)) {
                    lca = s;
                    break;
                }
            }
            
            if (!lca) return [sourceId, targetId];
            
            const sourceToLca = [];
            for (let s of sourceAncestors) {
                sourceToLca.push(s);
                if (s === lca) break;
            }
            
            const lcaToTarget = [];
            for (let t of targetAncestors) {
                if (t === lca) continue;
                lcaToTarget.unshift(t);
            }
            
            return [...sourceToLca, ...lcaToTarget];
        }

                treeContainer.appendChild(treeCanvas);

        function drawMap() {

            mapCtx.moveTo(mapWidth * 0.05, mapHeight * 0.30);
            mapCtx.lineTo(mapWidth * 0.22, mapHeight * 0.28);
            mapCtx.lineTo(mapWidth * 0.25, mapHeight * 0.45);
            mapCtx.lineTo(mapWidth * 0.15, mapHeight * 0.52);
            mapCtx.lineTo(mapWidth * 0.05, mapHeight * 0.48);
            mapCtx.fill();
            
            // South America
            mapCtx.fillStyle = '#3a6a5a';
            mapCtx.beginPath();
            mapCtx.moveTo(mapWidth * 0.15, mapHeight * 0.55);
            mapCtx.lineTo(mapWidth * 0.25, mapHeight * 0.52);
            mapCtx.lineTo(mapWidth * 0.28, mapHeight * 0.80);
            mapCtx.lineTo(mapWidth * 0.18, mapHeight * 0.82);
            mapCtx.fill();
            
            // Europe
            mapCtx.fillStyle = '#2a4a5a';
            mapCtx.beginPath();
            mapCtx.moveTo(mapWidth * 0.28, mapHeight * 0.32);
            mapCtx.lineTo(mapWidth * 0.52, mapHeight * 0.30);
            mapCtx.lineTo(mapWidth * 0.48, mapHeight * 0.55);
            mapCtx.lineTo(mapWidth * 0.30, mapHeight * 0.58);
            mapCtx.fill();
            
            // Asia
            mapCtx.fillStyle = '#3a5a6a';
            mapCtx.beginPath();
            mapCtx.moveTo(mapWidth * 0.50, mapHeight * 0.28);
            mapCtx.lineTo(mapWidth * 0.92, mapHeight * 0.26);
            mapCtx.lineTo(mapWidth * 0.95, mapHeight * 0.62);
            mapCtx.lineTo(mapWidth * 0.65, mapHeight * 0.68);
            mapCtx.lineTo(mapWidth * 0.48, mapHeight * 0.55);
            mapCtx.fill();
            
            // Africa
            mapCtx.fillStyle = '#2a5a4a';
            mapCtx.beginPath();
            mapCtx.moveTo(mapWidth * 0.42, mapHeight * 0.58);
            mapCtx.lineTo(mapWidth * 0.58, mapHeight * 0.56);
            mapCtx.lineTo(mapWidth * 0.55, mapHeight * 0.82);
            mapCtx.lineTo(mapWidth * 0.40, mapHeight * 0.80);
            mapCtx.fill();
            
            // Draw dots with labels
            mapDotsData.forEach(dot => {
                const x = dot.mapX * mapWidth;
                const y = dot.mapY * mapHeight;
                const radius = 10;
                
                // Dot
                mapCtx.beginPath();
                mapCtx.arc(x, y, radius, 0, Math.PI * 2);
                mapCtx.fillStyle = dot.color;
                mapCtx.fill();
                mapCtx.beginPath();
                mapCtx.arc(x, y, radius * 0.4, 0, Math.PI * 2);
                mapCtx.fillStyle = 'white';
                mapCtx.fill();
                
                // Label background
                mapCtx.fillStyle = 'rgba(0,0,0,0.7)';
                mapCtx.font = `bold ${Math.floor(mapWidth * 0.01)}px Arial`;
                const metrics = mapCtx.measureText(dot.name);
                mapCtx.fillRect(x + 12, y - 10, metrics.width + 8, 16);
                
                // Label text
                mapCtx.fillStyle = dot.color;
                mapCtx.fillText(dot.name, x + 16, y - 2);
            });
            
            // Continent labels
            mapCtx.fillStyle = 'rgba(255,255,255,0.35)';
            mapCtx.font = `italic ${Math.floor(mapWidth * 0.02)}px Arial`;
            mapCtx.fillText("NORTH AMERICA", mapWidth * 0.08, mapHeight * 0.28);
            mapCtx.fillText("SOUTH AMERICA", mapWidth * 0.12, mapHeight * 0.68);
            mapCtx.fillText("EUROPE", mapWidth * 0.32, mapHeight * 0.28);
            mapCtx.fillText("ASIA", mapWidth * 0.68, mapHeight * 0.25);
            mapCtx.fillText("AFRICA", mapWidth * 0.45, mapHeight * 0.55);
        }

        function drawFullTree() {
            if (!treeCtx) return;
            
            treeCtx.clearRect(0, 0, mapWidth, mapHeight);
            treeCtx.fillStyle = '#0a1620';
            treeCtx.fillRect(0, 0, mapWidth, mapHeight);
            
            // Draw edges
            uniqueLanguages.forEach(lang => {
                if (lang.parent) {
                    const parent = uniqueLanguages.find(l => l.id === lang.parent);
                    if (parent && parent.treeX !== undefined) {
                        const fromX = parent.treeX * mapWidth;
                        const fromY = parent.treeY * mapHeight;
                        const toX = lang.treeX * mapWidth;
                        const toY = lang.treeY * mapHeight;
                        
                        treeCtx.beginPath();
                        treeCtx.moveTo(fromX, fromY);
                        const cp1x = fromX;
                        const cp1y = (fromY + toY) / 2;
                        const cp2x = toX;
                        const cp2y = (fromY + toY) / 2;
                        treeCtx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, toX, toY);
                        treeCtx.strokeStyle = '#ffffff40';
                        treeCtx.lineWidth = 2;
                        treeCtx.stroke();
                    }
                }
            });
            
            // Draw nodes
            uniqueLanguages.forEach(lang => {
                if (lang.treeX === undefined) return;
                const x = lang.treeX * mapWidth;
                const y = lang.treeY * mapHeight;
                const radius = lang.isAncestor ? 5 : 7;
                
                treeCtx.beginPath();
                treeCtx.arc(x, y, radius, 0, Math.PI * 2);
                treeCtx.fillStyle = lang.color;
                treeCtx.fill();
                treeCtx.beginPath();
                treeCtx.arc(x, y, radius * 0.4, 0, Math.PI * 2);
                treeCtx.fillStyle = 'white';
                treeCtx.fill();
                
                if (lang.isAncestor) {
                    treeCtx.fillStyle = '#888888';
                    treeCtx.font = `${Math.floor(mapWidth * 0.008)}px Arial`;
                    treeCtx.fillText(lang.name, x + radius + 4, y - 3);
                }
            });
        }

        function highlightTreePath(pathIds) {
            if (!treeCtx) return;
            
            const pathSet = new Set(pathIds);
            
            treeCtx.clearRect(0, 0, mapWidth, mapHeight);
            treeCtx.fillStyle = '#0a1620';
            treeCtx.fillRect(0, 0, mapWidth, mapHeight);
            
            uniqueLanguages.forEach(lang => {
                if (lang.parent) {
                    const parent = uniqueLanguages.find(l => l.id === lang.parent);
                    if (parent && parent.treeX !== undefined) {
                        const fromX = parent.treeX * mapWidth;
                        const fromY = parent.treeY * mapHeight;
                        const toX = lang.treeX * mapWidth;
                        const toY = lang.treeY * mapHeight;
                        const isPathEdge = pathSet.has(lang.id) && pathSet.has(parent.id);
                        
                        treeCtx.beginPath();
                        treeCtx.moveTo(fromX, fromY);
                        const cp1x = fromX;
                        const cp1y = (fromY + toY) / 2;
                        const cp2x = toX;
                        const cp2y = (fromY + toY) / 2;
                        treeCtx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, toX, toY);
                        
                        if (isPathEdge) {
                            treeCtx.strokeStyle = '#ff3333';
                            treeCtx.lineWidth = 4;
                        } else {
                            treeCtx.strokeStyle = '#ffffff15';
                            treeCtx.lineWidth = 2;
                        }
                        treeCtx.stroke();
                    }
                }
            });
            
            uniqueLanguages.forEach(lang => {
                if (lang.treeX === undefined) return;
                const x = lang.treeX * mapWidth;
                const y = lang.treeY * mapHeight;
                const isPathNode = pathSet.has(lang.id);
                const isSource = sourceLang?.id === lang.id;
                const isTarget = targetLang?.id === lang.id;
                const baseRadius = lang.isAncestor ? 5 : 7;
                
                if (isPathNode || isSource || isTarget) {
                    treeCtx.beginPath();
                    treeCtx.arc(x, y, baseRadius + 4, 0, Math.PI * 2);
                    if (isSource || isTarget) {
                        treeCtx.fillStyle = '#ff3300';
                    } else {
                        treeCtx.fillStyle = '#ffaa44';
                    }
                    treeCtx.fill();
                    treeCtx.beginPath();
                    treeCtx.arc(x, y, baseRadius, 0, Math.PI * 2);
                    treeCtx.fillStyle = lang.color;
                    treeCtx.fill();
                    treeCtx.beginPath();
                    treeCtx.arc(x, y, baseRadius * 0.4, 0, Math.PI * 2);
                    treeCtx.fillStyle = 'white';
                    treeCtx.fill();
                    
                    treeCtx.fillStyle = 'white';
                    treeCtx.font = `bold ${Math.floor(mapWidth * 0.01)}px Arial`;
                    treeCtx.fillText(lang.name, x + baseRadius + 6, y - 4);
                } else {
                    treeCtx.beginPath();
                    treeCtx.arc(x, y, baseRadius, 0, Math.PI * 2);
                    treeCtx.fillStyle = lang.color + '40';
                    treeCtx.fill();
                    treeCtx.beginPath();
                    treeCtx.arc(x, y, baseRadius * 0.4, 0, Math.PI * 2);
                    treeCtx.fillStyle = lang.color + '80';
                    treeCtx.fill();
                    
                    if (lang.isAncestor) {
                        treeCtx.fillStyle = '#444444';
                        treeCtx.font = `${Math.floor(mapWidth * 0.008)}px Arial`;
                        treeCtx.fillText(lang.name, x + baseRadius + 4, y - 3);
                    }
                }
            });
        }

        function createClickableElements() {
            const mapOverlay = document.createElement('div');
            mapOverlay.style.position = 'absolute';
            mapOverlay.style.top = '0';
            mapOverlay.style.left = '0';
            mapOverlay.style.width = '100%';
            mapOverlay.style.height = '100%';
            mapOverlay.style.zIndex = '15';
            mapOverlay.style.pointerEvents = 'auto';
            mapOverlay.id = 'map-click-overlay';
            
            const treeOverlay = document.createElement('div');
            treeOverlay.style.position = 'absolute';
            treeOverlay.style.top = '0';
            treeOverlay.style.left = '0';
            treeOverlay.style.width = '100%';
            treeOverlay.style.height = '100%';
            treeOverlay.style.zIndex = '15';
            treeOverlay.style.pointerEvents = 'auto';
            treeOverlay.id = 'tree-click-overlay';
            treeOverlay.style.display = 'none';
            
            // Map dots (all, including replicas)
            mapDotsData.forEach(dot => {
                const x = dot.mapX * mapWidth;
                const y = dot.mapY * mapHeight;
                
                const el = document.createElement('div');
                el.className = 'map-dot';
                el.style.backgroundColor = dot.color;
                el.style.left = x + 'px';
                el.style.top = y + 'px';
                el.title = dot.name;
                el.onclick = (e) => {
                    e.stopPropagation();
                    // Find the unique language by ID
                    const lang = uniqueLanguages.find(l => l.id === dot.languageId);
                    if (lang) handleLanguageClick(lang);
                };
                mapOverlay.appendChild(el);
            });
            
            // Tree dots (only unique languages, no replicas)
            uniqueLanguages.filter(l => !l.isAncestor && l.treeX !== undefined).forEach(lang => {
                const x = lang.treeX * mapWidth;
                const y = lang.treeY * mapHeight;
                
                const el = document.createElement('div');
                el.className = 'tree-dot';
                el.style.backgroundColor = lang.color;
                el.style.left = x + 'px';
                el.style.top = y + 'px';
                el.title = lang.name;
                el.onclick = (e) => {
                    e.stopPropagation();
                    handleLanguageClick(lang);
                };
                treeOverlay.appendChild(el);
            });
            
            const existingMapOverlay = document.querySelector('#map-click-overlay');
            if (existingMapOverlay) existingMapOverlay.remove();
            const existingTreeOverlay = document.querySelector('#tree-click-overlay');
            if (existingTreeOverlay) existingTreeOverlay.remove();
            
            document.body.appendChild(mapOverlay);
            document.body.appendChild(treeOverlay);
        }

        function updateView() {
            const mapOverlay = document.querySelector('#map-click-overlay');
            const treeOverlay = document.querySelector('#tree-click-overlay');
            const mapIcon = document.getElementById('map-icon');
            const treeIcon = document.getElementById('tree-icon');
            
            if (currentView === 'map') {
                document.getElementById('map-canvas').style.opacity = '1';
                document.getElementById('tree-canvas').style.opacity = '0';
                if (mapOverlay) mapOverlay.style.display = 'block';
                if (treeOverlay) treeOverlay.style.display = 'none';
                mapIcon.classList.add('active');
                treeIcon.classList.remove('active');
            } else {
                document.getElementById('map-canvas').style.opacity = '0';
                document.getElementById('tree-canvas').style.opacity = '1';
                if (mapOverlay) mapOverlay.style.display = 'none';
                if (treeOverlay) treeOverlay.style.display = 'block';
                mapIcon.classList.remove('active');
                treeIcon.classList.add('active');
            }
        }

        function updateDotSelection() {
            const mapDots = document.querySelectorAll('.map-dot');
            const treeDots = document.querySelectorAll('.tree-dot');
            
            mapDots.forEach(dot => dot.classList.remove('selected'));
            treeDots.forEach(dot => dot.classList.remove('selected'));
            
            if (sourceLang) {
                // Find all map dots with matching name
                const sourceMapDots = Array.from(mapDots).filter(d => d.title === sourceLang.name);
                sourceMapDots.forEach(dot => dot.classList.add('selected'));
                
                // Find tree dot
                const treeDot = Array.from(treeDots).find(d => d.title === sourceLang.name);
                if (treeDot) treeDot.classList.add('selected');
                
                document.getElementById('source-name').innerText = sourceLang.name;
                document.getElementById('source-badge').classList.remove('empty');
            } else {
                document.getElementById('source-name').innerText = '—';
                document.getElementById('source-badge').classList.add('empty');
            }
            
            if (targetLang) {
                const targetMapDots = Array.from(mapDots).filter(d => d.title === targetLang.name);
                targetMapDots.forEach(dot => dot.classList.add('selected'));
                
                document.getElementById('target-name').innerText = targetLang.name;
                document.getElementById('target-badge').classList.remove('empty');
            } else {
                document.getElementById('target-name').innerText = '—';
                document.getElementById('target-badge').classList.add('empty');
            }
        }

        async function updatePathHighlight() {
            if (sourceLang && targetLang) {
                const pathIds = findEvolutionaryPath(sourceLang.id, targetLang.id);
                pathHighlightActive = true;
                highlightTreePath(pathIds);
                
                const commonAncestorId = pathIds.length > 1 ? pathIds[1] : null;
                const commonAncestor = commonAncestorId ? uniqueLanguages.find(l => l.id === commonAncestorId)?.name : 'common ancestor';
                
                const panel = document.getElementById('lesson-panel');
                const bodyDiv = document.getElementById('lesson-body');
                bodyDiv.innerHTML = '<div class="loading">✨ Generating lesson...</div>';
                panel.classList.add('visible');
                
                await new Promise(r => setTimeout(r, 600));
                bodyDiv.innerHTML = `
                    <strong>${sourceLang.name} → ${targetLang.name}</strong><br>
                    <span style="font-size:11px; opacity:0.8;">🔴 Path via ${commonAncestor} (${pathIds.length - 1} steps)</span><br><br>
                    • Cognate recognition<br>
                    • Grammar comparison<br>
                    • Practice dialogue<br>
                    <i style="font-size:10px;">(Replace with LLM API)</i>
                `;
            } else if (pathHighlightActive) {
                pathHighlightActive = false;
                drawFullTree();
                updateDotSelection();
            }
        }

        function handleLanguageClick(lang) {
            if (!sourceLang) {
                sourceLang = lang;
                updateDotSelection();
                if (targetLang) updatePathHighlight();
            } else if (sourceLang && !targetLang && sourceLang.id !== lang.id) {
                targetLang = lang;
                updateDotSelection();
                updatePathHighlight();
                if (currentView === 'map') {
                    toggleCheckbox.checked = true;
                    currentView = 'tree';
                    updateView();
                }
            } else if (sourceLang && targetLang) {
                resetSelection();
                sourceLang = lang;
                updateDotSelection();
            } else if (sourceLang && sourceLang.id === lang.id) {
                resetSelection();
            }
        }

        function resetSelection() {
            sourceLang = null;
            targetLang = null;
            updateDotSelection();
            
            if (pathHighlightActive) {
                pathHighlightActive = false;
                if (currentView === 'tree') {
                    drawFullTree();
                }
            }
            
            document.getElementById('lesson-panel').classList.remove('visible');
        }

        const toggleCheckbox = document.getElementById('view-toggle');
        toggleCheckbox.addEventListener('change', (e) => {
            currentView = e.target.checked ? 'tree' : 'map';
            updateView();
        });

        initCanvases();
        
        document.getElementById('reset-btn').addEventListener('click', resetSelection);
        document.getElementById('close-lesson').addEventListener('click', () => {
            document.getElementById('lesson-panel').classList.remove('visible');
        });
    </script>
</body>
</html>
